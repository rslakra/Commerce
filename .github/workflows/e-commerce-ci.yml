name: Commerce - Java e-commerce CI

on:
  push:
    paths:
      - "e-commerce/e-commerce/**"
      - ".github/workflows/e-commerce-ci.yml"
  pull_request:
    paths:
      - "e-commerce/e-commerce/**"
      - ".github/workflows/e-commerce-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: e-commerce/e-commerce

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: e-commerce/e-commerce/pom.xml

      - name: Build and run unit tests
        run: mvn -B -ntp test
